<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 670" width="360" height="670" style="background-color: light-dark(#ffffff, #0b0f19);">
  <defs>
    <!-- Gradients -->
    <linearGradient id="grad-s1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--step1-bg-start)"/>
      <stop offset="100%" stop-color="var(--step1-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-s2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--step2-bg-start)"/>
      <stop offset="100%" stop-color="var(--step2-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-s3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--step3-bg-start)"/>
      <stop offset="100%" stop-color="var(--step3-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-s4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--step4-bg-start)"/>
      <stop offset="100%" stop-color="var(--step4-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-s5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--step5-bg-start)"/>
      <stop offset="100%" stop-color="var(--step5-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-s6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--step6-bg-start)"/>
      <stop offset="100%" stop-color="var(--step6-bg-end)"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.06"/>
    </filter>

    <!-- Arrow Marker -->
    <marker id="arrow" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="var(--line)" />
    </marker>
  </defs>

  <style>
    :root {
      --bg: #ffffff;
      --text-title: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --line: #94a3b8;
      
      --step1-bg-start: #f8fafc; --step1-bg-end: #eff6ff; --step1-border: #3b82f6; --step1-text: #1e3a8a;
      --step2-bg-start: #f8fafc; --step2-bg-end: #eff6ff; --step2-border: #3b82f6; --step2-text: #1e3a8a;
      --step3-bg-start: #faf5ff; --step3-bg-end: #f3e8ff; --step3-border: #8b5cf6; --step3-text: #5b21b6;
      --step4-bg-start: #fdf2f8; --step4-bg-end: #fce7f3; --step4-border: #ec4899; --step4-text: #9d174d;
      --step5-bg-start: #ecfdf5; --step5-bg-end: #d1fae5; --step5-border: #10b981; --step5-text: #065f46;
      --step6-bg-start: #fffbeb; --step6-bg-end: #fef3c7; --step6-border: #f59e0b; --step6-text: #92400e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f19;
        --text-title: #f8fafc;
        --text-muted: #94a3b8;
        --border: #1e293b;
        --line: #475569;
        
        --step1-bg-start: #1e293b; --step1-bg-end: #0f172a; --step1-border: #3b82f6; --step1-text: #f8fafc;
        --step2-bg-start: #1e293b; --step2-bg-end: #0f172a; --step2-border: #3b82f6; --step2-text: #f8fafc;
        --step3-bg-start: #2e1065; --step3-bg-end: #0f172a; --step3-border: #a78bfa; --step3-text: #f8fafc;
        --step4-bg-start: #500724; --step4-bg-end: #0f172a; --step4-border: #f472b6; --step4-text: #f8fafc;
        --step5-bg-start: #064e3b; --step5-bg-end: #0f172a; --step5-border: #34d399; --step5-text: #f8fafc;
        --step6-bg-start: #78350f; --step6-bg-end: #0f172a; --step6-border: #fbbf24; --step6-text: #f8fafc;
      }
    }
    .title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 800;
      fill: var(--text-title);
    }
    .subtitle {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      fill: var(--text-muted);
    }
    .box {
      stroke-width: 1.5;
      filter: url(#shadow);
    }
    .badge {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 800;
      fill: #ffffff;
    }
    .box-text-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 700;
    }
    .box-text-desc {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 10px;
    }
    .arrow {
      stroke: var(--line);
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrow);
    }
  </style>

  <!-- Outside border -->
  <rect width="360" height="670" rx="12" fill="light-dark(#ffffff, #0b0f19)" stroke="var(--border)" stroke-width="1"/>

  <!-- Title Group -->
  <g transform="translate(180, 40)" text-anchor="middle">
    <text class="title" x="0" y="0">TWLogAIAN 基本フロー</text>
    <text class="subtitle" x="0" y="18">ログの読み込みから分析レポートまでの操作手順</text>
  </g>

  <!-- Step 1: Workspace -->
  <g transform="translate(40, 80)">
    <rect class="box" width="280" height="65" rx="8" fill="url(#grad-s1)" stroke="var(--step1-border)"/>
    <circle cx="28" cy="32.5" r="14" fill="var(--step1-border)"/>
    <text class="badge" x="28" y="32.5" text-anchor="middle" dominant-baseline="middle">1</text>
    <text class="box-text-title" x="52" y="25" fill="var(--step1-text)" dominant-baseline="middle">作業フォルダの選択</text>
    <text class="box-text-desc" x="52" y="45" fill="var(--text-muted)" dominant-baseline="middle">ログ検索用のインデックス保存先を指定</text>
  </g>

  <!-- Arrow 1 to 2 -->
  <path class="arrow" d="M 180 145 L 180 170"/>

  <!-- Step 2: Log Sources -->
  <g transform="translate(40, 170)">
    <rect class="box" width="280" height="65" rx="8" fill="url(#grad-s2)" stroke="var(--step2-border)"/>
    <circle cx="28" cy="32.5" r="14" fill="var(--step2-border)"/>
    <text class="badge" x="28" y="32.5" text-anchor="middle" dominant-baseline="middle">2</text>
    <text class="box-text-title" x="52" y="25" fill="var(--step2-text)" dominant-baseline="middle">ログを読み込む場所の設定</text>
    <text class="box-text-desc" x="52" y="45" fill="var(--text-muted)" dominant-baseline="middle">解析対象の各種ログソース（ファイル/SCP等）を登録</text>
  </g>

  <!-- Arrow 2 to 3 -->
  <path class="arrow" d="M 180 235 L 180 260"/>

  <!-- Step 3: Indexing Setup -->
  <g transform="translate(40, 260)">
    <rect class="box" width="280" height="65" rx="8" fill="url(#grad-s3)" stroke="var(--step3-border)"/>
    <circle cx="28" cy="32.5" r="14" fill="var(--step3-border)"/>
    <text class="badge" x="28" y="32.5" text-anchor="middle" dominant-baseline="middle">3</text>
    <text class="box-text-title" x="52" y="25" fill="var(--step3-text)" dominant-baseline="middle">インデックス作成の設定</text>
    <text class="box-text-desc" x="52" y="45" fill="var(--text-muted)" dominant-baseline="middle">自動検出するログの種類やGrokパターンの確認</text>
  </g>

  <!-- Arrow 3 to 4 -->
  <path class="arrow" d="M 180 325 L 180 350"/>

  <!-- Step 4: Load Logs -->
  <g transform="translate(40, 350)">
    <rect class="box" width="280" height="65" rx="8" fill="url(#grad-s4)" stroke="var(--step4-border)"/>
    <circle cx="28" cy="32.5" r="14" fill="var(--step4-border)"/>
    <text class="badge" x="28" y="32.5" text-anchor="middle" dominant-baseline="middle">4</text>
    <text class="box-text-title" x="52" y="25" fill="var(--step4-text)" dominant-baseline="middle">ログの読み込み</text>
    <text class="box-text-desc" x="52" y="45" fill="var(--text-muted)" dominant-baseline="middle">ログの自動解析・パース・インデックス登録の実行</text>
  </g>

  <!-- Arrow 4 to 5 -->
  <path class="arrow" d="M 180 415 L 180 440"/>

  <!-- Step 5: Search Logs -->
  <g transform="translate(40, 440)">
    <rect class="box" width="280" height="65" rx="8" fill="url(#grad-s5)" stroke="var(--step5-border)"/>
    <circle cx="28" cy="32.5" r="14" fill="var(--step5-border)"/>
    <text class="badge" x="28" y="32.5" text-anchor="middle" dominant-baseline="middle">5</text>
    <text class="box-text-title" x="52" y="25" fill="var(--step5-text)" dominant-baseline="middle">ログの検索</text>
    <text class="box-text-desc" x="52" y="45" fill="var(--text-muted)" dominant-baseline="middle">全文検索・期間絞り込み・検索条件でのログ抽出</text>
  </g>

  <!-- Arrow 5 to 6 -->
  <path class="arrow" d="M 180 505 L 180 530"/>

  <!-- Step 6: Reports -->
  <g transform="translate(40, 530)">
    <rect class="box" width="280" height="65" rx="8" fill="url(#grad-s6)" stroke="var(--step6-border)"/>
    <circle cx="28" cy="32.5" r="14" fill="var(--step6-border)"/>
    <text class="badge" x="28" y="32.5" text-anchor="middle" dominant-baseline="middle">6</text>
    <text class="box-text-title" x="52" y="25" fill="var(--step6-text)" dominant-baseline="middle">分析レポート</text>
    <text class="box-text-desc" x="52" y="45" fill="var(--text-muted)" dominant-baseline="middle">グラフ・時系列・ヒートマップ・AIによる自動解析</text>
  </g>
</svg>