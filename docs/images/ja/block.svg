<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1020" width="800" height="1020" style="background-color: light-dark(#ffffff, #0b0f19);">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="grad-src" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--src-bg-start)"/>
      <stop offset="100%" stop-color="var(--src-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-pip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--pip-bg-start)"/>
      <stop offset="100%" stop-color="var(--pip-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-sto" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--sto-bg-start)"/>
      <stop offset="100%" stop-color="var(--sto-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-ui" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--ui-bg-start)"/>
      <stop offset="100%" stop-color="var(--ui-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-ai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--ai-bg-start)"/>
      <stop offset="100%" stop-color="var(--ai-bg-end)"/>
    </linearGradient>
    <linearGradient id="grad-ext" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--ext-bg-start)"/>
      <stop offset="100%" stop-color="var(--ext-bg-end)"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="var(--line)" />
    </marker>
    <marker id="arrow-double-start" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="var(--line)" />
    </marker>
  </defs>

  <style>
    :root {
      --bg: #ffffff;
      --text-title: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --line: #94a3b8;
      
      --src-bg-start: #f8fafc;
      --src-bg-end: #eff6ff;
      --src-border: #3b82f6;
      --src-text: #1e3a8a;
      
      --pip-bg-start: #faf5ff;
      --pip-bg-end: #f3e8ff;
      --pip-border: #8b5cf6;
      --pip-text: #5b21b6;
      
      --sto-bg-start: #f0fdfa;
      --sto-bg-end: #ccfbf1;
      --sto-border: #0d9488;
      --sto-text: #115e59;

      --ui-bg-start: #ecfdf5;
      --ui-bg-end: #d1fae5;
      --ui-border: #10b981;
      --ui-text: #065f46;

      --ai-bg-start: #fffbeb;
      --ai-bg-end: #fef3c7;
      --ai-border: #f59e0b;
      --ai-text: #92400e;

      --ext-bg-start: #f8fafc;
      --ext-bg-end: #f1f5f9;
      --ext-border: #64748b;
      --ext-text: #334155;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f19;
        --text-title: #f8fafc;
        --text-muted: #94a3b8;
        --border: #1e293b;
        --line: #475569;
        
        --src-bg-start: #1e293b;
        --src-bg-end: #0f172a;
        --src-border: #3b82f6;
        --src-text: #f8fafc;
        
        --pip-bg-start: #2e1065;
        --pip-bg-end: #0f172a;
        --pip-border: #a78bfa;
        --pip-text: #f8fafc;
        
        --sto-bg-start: #115e59;
        --sto-bg-end: #0f172a;
        --sto-border: #14b8a6;
        --sto-text: #f8fafc;

        --ui-bg-start: #064e3b;
        --ui-bg-end: #0f172a;
        --ui-border: #34d399;
        --ui-text: #f8fafc;

        --ai-bg-start: #78350f;
        --ai-bg-end: #0f172a;
        --ai-border: #fbbf24;
        --ai-text: #f8fafc;

        --ext-bg-start: #1e293b;
        --ext-bg-end: #0f172a;
        --ext-border: #94a3b8;
        --ext-text: #f8fafc;
      }
    }
    .title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 22px;
      font-weight: 800;
      fill: var(--text-title);
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: var(--text-muted);
    }
    .section-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      font-weight: 700;
      fill: var(--text-title);
    }
    .box {
      stroke-width: 1.5;
      filter: url(#shadow);
    }
    .box-text-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 700;
    }
    .box-text-desc {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
    }
    .arrow-line {
      stroke: var(--line);
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrow);
    }
    .arrow-double {
      stroke: var(--line);
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrow);
      marker-start: url(#arrow-double-start);
    }
  </style>

  <!-- Background -->
  <rect width="800" height="1020" rx="16" fill="light-dark(#ffffff, #0b0f19)" stroke="var(--border)" stroke-width="1"/>

  <!-- Title -->
  <g transform="translate(40, 50)">
    <text class="title" x="0" y="0">TWLogAIAN ソフトウェア構成 &amp; 処理フロー</text>
    <text class="subtitle" x="0" y="24">ログの収集からAI分析・可視化までのアーキテクチャ概要</text>
  </g>

  <!-- Log Sources Section -->
  <text class="section-title" x="40" y="115">ログソース (Log Sources)</text>
  <g id="log-sources">
    <!-- Local Files -->
    <rect class="box" x="40" y="130" width="105" height="70" rx="8" fill="url(#grad-src)" stroke="var(--src-border)"/>
    <text class="box-text-title" x="92.5" y="157" fill="var(--src-text)" text-anchor="middle" dominant-baseline="middle">ローカルファイル</text>
    <text class="box-text-desc" x="92.5" y="177" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">Local Files</text>

    <!-- Remote Files -->
    <rect class="box" x="163" y="130" width="105" height="70" rx="8" fill="url(#grad-src)" stroke="var(--src-border)"/>
    <text class="box-text-title" x="215.5" y="157" fill="var(--src-text)" text-anchor="middle" dominant-baseline="middle">リモートファイル</text>
    <text class="box-text-desc" x="215.5" y="177" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">SCP / SFTP</text>

    <!-- TWSNMP FC -->
    <rect class="box" x="286" y="130" width="105" height="70" rx="8" fill="url(#grad-src)" stroke="var(--src-border)"/>
    <text class="box-text-title" x="338.5" y="157" fill="var(--src-text)" text-anchor="middle" dominant-baseline="middle">TWSNMP FC</text>
    <text class="box-text-desc" x="338.5" y="177" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">API連携</text>

    <!-- Docker / K8s -->
    <rect class="box" x="409" y="130" width="105" height="70" rx="8" fill="url(#grad-src)" stroke="var(--src-border)"/>
    <text class="box-text-title" x="461.5" y="157" fill="var(--src-text)" text-anchor="middle" dominant-baseline="middle">Docker / K8s</text>
    <text class="box-text-desc" x="461.5" y="177" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">コマンド/SSH</text>

    <!-- Gravwell -->
    <rect class="box" x="532" y="130" width="105" height="70" rx="8" fill="url(#grad-src)" stroke="var(--src-border)"/>
    <text class="box-text-title" x="584.5" y="157" fill="var(--src-text)" text-anchor="middle" dominant-baseline="middle">Gravwell</text>
    <text class="box-text-desc" x="584.5" y="177" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">API / Client</text>

    <!-- Windows Event -->
    <rect class="box" x="655" y="130" width="105" height="70" rx="8" fill="url(#grad-src)" stroke="var(--src-border)"/>
    <text class="box-text-title" x="707.5" y="157" fill="var(--src-text)" text-anchor="middle" dominant-baseline="middle">Windowsイベント</text>
    <text class="box-text-desc" x="707.5" y="177" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">Local / Remote</text>
  </g>

  <!-- Data Pipeline Section -->
  <text class="section-title" x="40" y="235">収集・解析パイプライン (Data Pipeline)</text>

  <!-- Arrow: Sources to Import -->
  <path class="arrow-line" d="M 400 200 L 400 245"/>

  <!-- 1. Import & Parse -->
  <rect class="box" x="220" y="245" width="360" height="75" rx="10" fill="url(#grad-pip)" stroke="var(--pip-border)"/>
  <text class="box-text-title" x="400" y="272" fill="var(--pip-text)" text-anchor="middle" dominant-baseline="middle">1. インポート &amp; パース (Import &amp; Parse)</text>
  <text class="box-text-desc" x="400" y="295" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">ログの読込・文字コード変換・フォーマット自動認識・行分割</text>

  <!-- Arrow: Import to Extract -->
  <path class="arrow-line" d="M 400 320 L 400 355"/>

  <!-- 2. Extract & Enrich -->
  <rect class="box" x="220" y="355" width="360" height="85" rx="10" fill="url(#grad-pip)" stroke="var(--pip-border)"/>
  <text class="box-text-title" x="400" y="382" fill="var(--pip-text)" text-anchor="middle" dominant-baseline="middle">2. フィールド抽出 &amp; データ補強 (Extract &amp; Enrich)</text>
  <text class="box-text-desc" x="400" y="407" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">Grokパターン/正規表現による重要情報の抽出と型変換</text>
  <text class="box-text-desc" x="400" y="423" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">IPから国/AS情報の付加・DNS名前解決によるエンリッチメント</text>

  <!-- External Enrichments (Right Side) -->
  <!-- DNS Server -->
  <rect class="box" x="620" y="345" width="140" height="45" rx="6" fill="url(#grad-ext)" stroke="var(--ext-border)"/>
  <text class="box-text-title" x="690" y="367" fill="var(--ext-text)" text-anchor="middle" dominant-baseline="middle">DNS サーバー</text>
  <text class="box-text-desc" x="690" y="382" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">名前解決の照会</text>

  <!-- GeoIP Database -->
  <rect class="box" x="620" y="405" width="140" height="45" rx="6" fill="url(#grad-ext)" stroke="var(--ext-border)"/>
  <text class="box-text-title" x="690" y="427" fill="var(--ext-text)" text-anchor="middle" dominant-baseline="middle">GeoIP DB</text>
  <text class="box-text-desc" x="690" y="442" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">位置情報の付加</text>

  <!-- Arrows to External systems -->
  <path class="arrow-line" d="M 580 375 L 612 368"/>
  <path class="arrow-line" d="M 580 415 L 612 422"/>

  <!-- Arrow: Extract to Indexing -->
  <path class="arrow-line" d="M 400 440 L 400 475"/>

  <!-- 3. Indexing -->
  <rect class="box" x="220" y="475" width="360" height="75" rx="10" fill="url(#grad-pip)" stroke="var(--pip-border)"/>
  <text class="box-text-title" x="400" y="502" fill="var(--pip-text)" text-anchor="middle" dominant-baseline="middle">3. インデックス作成 (Indexing)</text>
  <text class="box-text-desc" x="400" y="525" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">抽出済みデータから高速検索用の全文検索インデックスを生成</text>

  <!-- Arrow: Indexing to Storage -->
  <path class="arrow-line" d="M 400 550 L 400 595"/>

  <!-- Storage Layer Section -->
  <text class="section-title" x="40" y="590">保存層 (Storage Layer)</text>
  <rect x="180" y="605" width="440" height="120" rx="12" fill="none" stroke="var(--border)" stroke-dasharray="4 4" stroke-width="1.5"/>
  
  <!-- Bluge Search Index -->
  <rect class="box" x="200" y="625" width="180" height="80" rx="8" fill="url(#grad-sto)" stroke="var(--sto-border)"/>
  <text class="box-text-title" x="290" y="650" fill="var(--sto-text)" text-anchor="middle" dominant-baseline="middle">Bluge 全文検索</text>
  <text class="box-text-desc" x="290" y="672" fill="var(--sto-text)" text-anchor="middle" dominant-baseline="middle">検索用インデックスの保存</text>
  <text class="box-text-desc" x="290" y="688" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">Search Index (blugelabs)</text>

  <!-- bbolt DB -->
  <rect class="box" x="420" y="625" width="180" height="80" rx="8" fill="url(#grad-sto)" stroke="var(--sto-border)"/>
  <text class="box-text-title" x="510" y="650" fill="var(--sto-text)" text-anchor="middle" dominant-baseline="middle">bbolt DB</text>
  <text class="box-text-desc" x="510" y="672" fill="var(--sto-text)" text-anchor="middle" dominant-baseline="middle">メタデータ・システム設定</text>
  <text class="box-text-desc" x="510" y="688" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">Metadata Store (etcd.io)</text>

  <!-- User Interface & Analysis Section -->
  <text class="section-title" x="40" y="765">検索・可視化 &amp; AI分析 (User Interface &amp; Analysis)</text>

  <!-- Arrow: Storage to UI (Double-headed arrow representing bi-directional interaction) -->
  <path class="arrow-double" d="M 220 725 L 220 782"/>

  <!-- Search & Reports (Wails UI) -->
  <rect class="box" x="60" y="790" width="320" height="175" rx="12" fill="url(#grad-ui)" stroke="var(--ui-border)"/>
  <text class="box-text-title" x="220" y="815" fill="var(--ui-text)" text-anchor="middle" dominant-baseline="middle">検索 &amp; レポート可視化</text>
  <text class="box-text-desc" x="80" y="845" fill="var(--ui-text)" text-anchor="start" dominant-baseline="middle">✦ 柔軟なログ検索 (全文検索/条件フィルタ)</text>
  <text class="box-text-desc" x="80" y="865" fill="var(--ui-text)" text-anchor="start" dominant-baseline="middle">✦ 多彩なレポート表示 (グラフ・時系列・ヒートマップ)</text>
  <text class="box-text-desc" x="80" y="885" fill="var(--ui-text)" text-anchor="start" dominant-baseline="middle">✦ 3D地球儀によるログフローのビジュアライズ</text>
  <text class="box-text-desc" x="80" y="905" fill="var(--ui-text)" text-anchor="start" dominant-baseline="middle">✦ 異常検知 (iForestによるアノマリスコア算出)</text>
  <text class="box-text-desc" x="220" y="940" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">Wails Frontend (HTML / JS / CSS)</text>

  <!-- Arrow: UI to AI (Double-headed arrow representing query and response) -->
  <path class="arrow-double" d="M 380 877 L 412 877"/>

  <!-- AI Assistant (LLM Integration) -->
  <rect class="box" x="420" y="790" width="320" height="175" rx="12" fill="url(#grad-ai)" stroke="var(--ai-border)"/>
  <text class="box-text-title" x="580" y="815" fill="var(--ai-text)" text-anchor="middle" dominant-baseline="middle">AI アシスタント</text>
  <text class="box-text-desc" x="440" y="845" fill="var(--ai-text)" text-anchor="start" dominant-baseline="middle">✦ ログデータの自動解析と自然言語による解説</text>
  <text class="box-text-desc" x="440" y="868" fill="var(--ai-text)" text-anchor="start" dominant-baseline="middle">✦ 各種LLMプロバイダとの柔軟なインテグレーション:</text>
  
  <!-- LLM Providers Tags -->
  <g transform="translate(440, 890)">
    <!-- Ollama -->
    <rect x="0" y="0" width="60" height="22" rx="4" fill="var(--ai-bg-start)" stroke="var(--ai-border)" stroke-width="1"/>
    <text font-family="system-ui, sans-serif" font-size="10" font-weight="bold" x="30" y="11" fill="var(--ai-text)" text-anchor="middle" dominant-baseline="middle">Ollama</text>

    <!-- OpenAI -->
    <rect x="68" y="0" width="65" height="22" rx="4" fill="var(--ai-bg-start)" stroke="var(--ai-border)" stroke-width="1"/>
    <text font-family="system-ui, sans-serif" font-size="10" font-weight="bold" x="100.5" y="11" fill="var(--ai-text)" text-anchor="middle" dominant-baseline="middle">OpenAI</text>

    <!-- Gemini -->
    <rect x="141" y="0" width="65" height="22" rx="4" fill="var(--ai-bg-start)" stroke="var(--ai-border)" stroke-width="1"/>
    <text font-family="system-ui, sans-serif" font-size="10" font-weight="bold" x="173.5" y="11" fill="var(--ai-text)" text-anchor="middle" dominant-baseline="middle">Gemini</text>

    <!-- Claude -->
    <rect x="214" y="0" width="60" height="22" rx="4" fill="var(--ai-bg-start)" stroke="var(--ai-border)" stroke-width="1"/>
    <text font-family="system-ui, sans-serif" font-size="10" font-weight="bold" x="244" y="11" fill="var(--ai-text)" text-anchor="middle" dominant-baseline="middle">Claude</text>
  </g>
  
  <text class="box-text-desc" x="580" y="940" fill="var(--text-muted)" text-anchor="middle" dominant-baseline="middle">langchaingo / google-generative-ai-go</text>
</svg>
