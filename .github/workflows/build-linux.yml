name: Build and Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            build-essential

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Frontend Dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          cd ..

      - name: Build Wails App for Linux
        run: |
          # Gitタグをバージョンとして使用。手動実行時のフォールバックとしてv2.0.0を使用
          VERSION="${{ github.ref_name }}"
          if [[ ! "$VERSION" =~ ^v[0-9] ]]; then
            VERSION="v2.0.0"
          fi
          COMMIT=$(git rev-parse --short HEAD)
          wails build -clean -platform linux/amd64 -tags webkit2_41 -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}"

      - name: Package Binary
        run: |
          mkdir -p dist
          cp build/bin/TWLogAIAN dist/TWLogAIAN
          cd dist
          tar -czvf ../TWLogAIAN-linux-amd64.tar.gz TWLogAIAN
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TWLogAIAN-linux-amd64
          path: TWLogAIAN-linux-amd64.tar.gz
          retention-days: 5

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TWLogAIAN-linux-amd64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
